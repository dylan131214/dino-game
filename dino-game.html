<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공룡 달리기 🦕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  h1 {
    color: #e94560;
    font-size: 1.4rem;
    margin-bottom: 16px;
    text-shadow: 0 0 20px #e94560aa;
    letter-spacing: 2px;
  }

  #score-board {
    display: flex;
    gap: 40px;
    margin-bottom: 12px;
    color: #fff;
    font-size: 0.6rem;
  }

  #score-board span { color: #0f3460; }
  #score-val, #hi-val { color: #e94560; }

  #game-wrapper {
    position: relative;
    border: 3px solid #e94560;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px #e9456044, 0 0 80px #e9456022;
  }

  canvas {
    display: block;
    background: #16213e;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2ecc;
    backdrop-filter: blur(4px);
    transition: opacity 0.3s;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay-title {
    font-size: 1rem;
    color: #e94560;
    margin-bottom: 20px;
    text-shadow: 0 0 14px #e94560;
    text-align: center;
    line-height: 2;
  }

  #overlay-sub {
    font-size: 0.5rem;
    color: #a8b2d8;
    text-align: center;
    line-height: 2.4;
    margin-bottom: 24px;
  }

  #start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.65rem;
    background: #e94560;
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 0 20px #e94560aa;
    transition: transform 0.1s, box-shadow 0.1s;
    animation: pulse 1.2s ease-in-out infinite;
  }

  #start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #e94560cc;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px #e94560aa; }
    50% { box-shadow: 0 0 36px #e94560ee; }
  }

  #hint {
    margin-top: 10px;
    font-size: 0.4rem;
    color: #536082;
    text-align: center;
  }
</style>
</head>
<body>

<h1>🦕 공룡 달리기</h1>
<div id="score-board">
  <div>점수: <span id="score-val">0</span></div>
  <div>최고: <span id="hi-val">0</span></div>
</div>

<div id="game-wrapper">
  <canvas id="c" width="700" height="200"></canvas>
  <div id="overlay">
    <div id="overlay-title">🦕 공룡 달리기</div>
    <div id="overlay-sub">
      스페이스바 또는 ↑ 키로 점프!<br>
      모바일은 화면을 터치하세요
    </div>
    <button id="start-btn" onclick="startGame()">게임 시작!</button>
  </div>
</div>
<div id="hint">점프: 스페이스바 / ↑ 키 / 화면 터치</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 40;

// --- 🔊 사운드 (Web Audio API) ---
// 외부 파일 없이 코드만으로 소리를 만들어!
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// 기본 소리 재생 함수
function playSound(type, freq, duration, shape = 'square', volume = 0.3) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();   // 소리 발생기
    const gain = ac.createGain();         // 볼륨 조절기
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = shape;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime(volume, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}

// 🦕 점프 소리: 높은 음이 빠르게 올라가는 느낌
function soundJump() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.12);
    gain.gain.setValueAtTime(0.25, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(); osc.stop(ac.currentTime + 0.18);
  } catch(e) {}
}

// 💥 게임 오버 소리: 낮은 음이 뚝 떨어지는 느낌
function soundGameOver() {
  try {
    const ac = getAudio();
    [0, 0.1, 0.2].forEach((delay, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sawtooth';
      const startFreq = 400 - i * 100;
      osc.frequency.setValueAtTime(startFreq, ac.currentTime + delay);
      osc.frequency.exponentialRampToValueAtTime(startFreq * 0.4, ac.currentTime + delay + 0.15);
      gain.gain.setValueAtTime(0.3, ac.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.2);
      osc.start(ac.currentTime + delay);
      osc.stop(ac.currentTime + delay + 0.25);
    });
  } catch(e) {}
}

// 🌵 장애물 피했을 때: 경쾌한 짧은 삑 소리
function soundDodge() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ac.currentTime);
    osc.frequency.setValueAtTime(1100, ac.currentTime + 0.05);
    gain.gain.setValueAtTime(0.15, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    osc.start(); osc.stop(ac.currentTime + 0.12);
  } catch(e) {}
}

// 🏆 점수 올라갈 때 (100점마다): 밝은 상승 멜로디
function soundScore() {
  try {
    const ac = getAudio();
    const notes = [523, 659, 784]; // 도-미-솔
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.08);
      gain.gain.setValueAtTime(0.2, ac.currentTime + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.08 + 0.12);
      osc.start(ac.currentTime + i * 0.08);
      osc.stop(ac.currentTime + i * 0.08 + 0.15);
    });
  } catch(e) {}
}

// --- 색상 팔레트 ---
const C = {
  ground: '#0f3460',
  groundLine: '#1a4a7a',
  dino: '#e94560',
  dinoEye: '#fff',
  cactus: '#4ecca3',
  cloud: '#1e3a5f',
  star: '#a8b2d8',
  text: '#fff',
  score: '#e94560',
};

// --- 게임 상태 ---
let running = false, over = false;
let score = 0, hiScore = 0, frame = 0;
let speed = 5;

// --- 별 (배경) ---
const stars = Array.from({length: 40}, () => ({
  x: Math.random() * W,
  y: Math.random() * (GROUND - 60),
  r: Math.random() * 1.5 + 0.3,
  twinkle: Math.random() * Math.PI * 2,
}));

// --- 구름 ---
let clouds = [];
function spawnCloud() {
  clouds.push({ x: W + 60, y: 20 + Math.random() * 60, w: 60 + Math.random() * 60, h: 20 + Math.random() * 20 });
}
spawnCloud();

// --- 공룡 ---
const dino = {
  x: 80, y: GROUND, w: 32, h: 40,
  vy: 0, jumping: false, leg: 0,
  jump() {
    if (!this.jumping) { this.vy = -13; this.jumping = true; soundJump(); }
  },
  update() {
    this.vy += 0.6;
    this.y += this.vy;
    if (this.y >= GROUND) { this.y = GROUND; this.vy = 0; this.jumping = false; }
    if (!this.jumping) this.leg = (frame >> 3) & 1;
  },
  draw() {
    const bx = this.x, by = this.y - this.h;
    // 몸통
    ctx.fillStyle = C.dino;
    ctx.beginPath();
    ctx.roundRect(bx, by, this.w, this.h - 8, 6);
    ctx.fill();
    // 머리
    ctx.beginPath();
    ctx.roundRect(bx + 10, by - 16, 22, 18, 5);
    ctx.fill();
    // 눈
    ctx.fillStyle = C.dinoEye;
    ctx.beginPath(); ctx.arc(bx + 27, by - 10, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.arc(bx + 28, by - 10, 1.5, 0, Math.PI * 2); ctx.fill();
    // 꼬리
    ctx.fillStyle = C.dino;
    ctx.beginPath();
    ctx.moveTo(bx, by + 8);
    ctx.lineTo(bx - 14, by + 18);
    ctx.lineTo(bx, by + 22);
    ctx.fill();
    // 다리
    const legOff = this.leg ? 4 : -4;
    ctx.fillRect(bx + 6, by + this.h - 8, 8, 12 + legOff);
    ctx.fillRect(bx + 18, by + this.h - 8, 8, 12 - legOff);
  },
  box() { return { x: this.x + 4, y: this.y - this.h + 4, w: this.w - 8, h: this.h - 4 }; }
};

// --- 장애물 (선인장) ---
let obstacles = [];
let nextObstacle = 80;

function spawnObstacle() {
  const h = 28 + Math.random() * 24;
  const w = 16 + Math.random() * 12;
  obstacles.push({ x: W + 10, y: GROUND - h, w, h, arm: Math.random() > 0.4 });
}

function drawCactus(o) {
  ctx.fillStyle = C.cactus;
  // 몸통
  ctx.beginPath();
  ctx.roundRect(o.x, o.y, o.w, o.h, 4);
  ctx.fill();
  // 팔
  if (o.arm) {
    const aw = o.w * 0.8, ah = 10;
    ctx.beginPath();
    ctx.roundRect(o.x - aw, o.y + o.h * 0.3, aw, ah, 3);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(o.x - aw, o.y + o.h * 0.3 - 14, 8, 16, 3);
    ctx.fill();
    // 오른쪽 팔
    ctx.beginPath();
    ctx.roundRect(o.x + o.w, o.y + o.h * 0.5, aw * 0.8, ah, 3);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(o.x + o.w + aw * 0.8 - 8, o.y + o.h * 0.5 - 12, 8, 14, 3);
    ctx.fill();
  }
}

// --- 충돌 체크 ---
function collides(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// --- 게임 루프 ---
function update() {
  if (!running) return;
  frame++;
  score++;
  speed = 5 + Math.floor(score / 300) * 0.5;

  // 별 반짝임
  stars.forEach(s => s.twinkle += 0.05);

  // 구름
  clouds.forEach(c => c.x -= speed * 0.3);
  clouds = clouds.filter(c => c.x > -100);
  if (frame % 120 === 0) spawnCloud();

  // 공룡
  dino.update();

  // 장애물
  nextObstacle--;
  if (nextObstacle <= 0) {
    spawnObstacle();
    nextObstacle = 60 + Math.floor(Math.random() * 80) - Math.floor(score / 500) * 5;
    nextObstacle = Math.max(nextObstacle, 35);
  }
  obstacles.forEach(o => o.x -= speed);

  // 장애물 피했을 때 소리
  obstacles.forEach(o => {
    if (!o.passed && o.x + o.w < dino.x) {
      o.passed = true;
      soundDodge();
    }
  });

  obstacles = obstacles.filter(o => o.x > -60);

  // 충돌
  const db = dino.box();
  for (const o of obstacles) {
    const ob = { x: o.x + 3, y: o.y + 2, w: o.w - 6, h: o.h - 2 };
    if (collides(db, ob)) { gameOver(); return; }
  }

  const currentScore = Math.floor(score / 5);
  const prevScore = Math.floor((score - 1) / 5);
  if (currentScore > 0 && currentScore % 100 === 0 && prevScore % 100 !== 0) {
    soundScore();
  }

  document.getElementById('score-val').textContent = currentScore;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // 배경
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, W, H);

  // 별
  stars.forEach(s => {
    const alpha = 0.4 + 0.4 * Math.sin(s.twinkle);
    ctx.fillStyle = `rgba(168,178,216,${alpha})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });

  // 구름
  clouds.forEach(c => {
    ctx.fillStyle = C.cloud;
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w * 0.25, c.y - c.h * 0.2, c.w * 0.35, c.h * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // 땅
  ctx.fillStyle = C.ground;
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = C.groundLine;
  ctx.fillRect(0, GROUND, W, 2);

  // 땅 점선 패턴
  ctx.fillStyle = '#1a4a7a';
  for (let i = (frame * speed) % 30; i < W; i += 30) {
    ctx.fillRect(i, GROUND + 8, 18, 2);
  }

  // 장애물
  obstacles.forEach(o => drawCactus(o));

  // 공룡
  dino.draw();
}

function loop() {
  update();
  draw();
  if (running) requestAnimationFrame(loop);
}

function startGame() {
  score = 0; frame = 0; speed = 5;
  obstacles = []; clouds = [];
  dino.x = 80; dino.y = GROUND; dino.vy = 0; dino.jumping = false;
  spawnCloud(); nextObstacle = 80;
  running = true; over = false;
  document.getElementById('overlay').classList.add('hidden');
  requestAnimationFrame(loop);
}

function gameOver() {
  running = false; over = true;
  soundGameOver();
  const s = Math.floor(score / 5);
  if (s > hiScore) { hiScore = s; document.getElementById('hi-val').textContent = hiScore; }
  // 오버레이
  const ov = document.getElementById('overlay');
  document.getElementById('overlay-title').innerHTML = `💥 게임 오버!<br><span style="font-size:0.7rem;color:#4ecca3">점수: ${s}</span>`;
  document.getElementById('overlay-sub').innerHTML = `최고 점수: <span style="color:#e94560">${hiScore}</span><br><br>다시 도전해봐!`;
  document.getElementById('start-btn').textContent = '다시 시작!';
  ov.classList.remove('hidden');
}

// --- 입력 ---
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (running) dino.jump();
  }
});
canvas.addEventListener('click', () => { if (running) dino.jump(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (running) dino.jump(); }, { passive: false });
</script>
</body>
</html>
